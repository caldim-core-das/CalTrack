# =============================================================================
# CALTRACK — Nginx configuration block
#
# INSTRUCTIONS:
#   1. SSH into your VPS
#   2. Find your existing Nginx site config:
#      sudo nano /etc/nginx/sites-available/caldimproducts.com
#      (or wherever your existing server block is)
#   3. INSIDE the existing server { ... } block for caldimproducts.com,
#      ADD the blocks below — do NOT replace anything else.
#   4. Test:  sudo nginx -t
#   5. Apply: sudo systemctl reload nginx
#
# ⚠ DO NOT create a new server {} block — add these location {} blocks
#   inside the EXISTING server block for caldimproducts.com
# =============================================================================

    # ── CALTRACK — START (do not modify lines above this) ────────────────────

    # 1. React static assets (JS/CSS chunks from Vite build)
    location /Caltrack/assets/ {
        alias /var/www/Caltrack/frontend_dist/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # 2. Media uploads (profile photos, etc.)
    location /Caltrack/media/ {
        alias /var/www/Caltrack/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # 3. Django collected static files (admin, etc.)
    location /Caltrack/static/ {
        alias /var/www/Caltrack/backend/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 4. WebSocket connections (Django Channels / live locations)
    location /Caltrack/ws/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    # 5. Django API (all /Caltrack/api/ requests → Daphne on port 8002)
    location /Caltrack/api/ {
        proxy_pass http://127.0.0.1:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
        proxy_connect_timeout 60;
        client_max_body_size 50M;
    }

    # 6. React SPA — catch-all for frontend routing (MUST be last)
    location /Caltrack/ {
        alias /var/www/Caltrack/frontend_dist/;
        try_files $uri $uri/ /Caltrack/index.html;
        # Security headers
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    # Exact match for /Caltrack (without trailing slash) → redirect
    location = /Caltrack {
        return 301 /Caltrack/;
    }

    # ── CALTRACK — END ───────────────────────────────────────────────────────
